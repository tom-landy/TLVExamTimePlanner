<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLV Exam Calendar</title>
    <meta
      name="description"
      content="Plan exam tasks across four weeks, with built-in breaks and candidate availability."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <h1>TLV Exam Calendar</h1>
        </div>
      </header>

      <main class="layout">
        <section class="panel control-panel">
          <form id="planner-form" class="planner-form">
            <div class="setup-grid">
              <label>
                Exam
                <select id="exam-type">
                  <option value="ESP">ESP</option>
                  <option value="OSP">OSP</option>
                </select>
              </label>

              <label>
                Candidate timing
                <select id="timing-type">
                  <option value="standard">Standard</option>
                  <option value="extra">Extra</option>
                </select>
              </label>

              <label class="compare-toggle">
                Show both calendars
                <span class="compare-toggle-row">
                  <input id="compare-mode" type="checkbox" checked />
                  <span>Show standard + extra side by side</span>
                </span>
              </label>

              <label>
                Start week
                <input id="week-start" type="date" required />
              </label>
            </div>

            <details class="presentation-field presentation-dropdown">
              <summary class="presentation-summary" id="presentation-summary">Presentation days</summary>
              <div class="presentation-days" id="presentation-days"></div>
            </details>

            <div class="task-list" id="task-list"></div>

            <div class="button-row">
              <button class="primary-button" id="auto-place-button" type="button">Auto Place All Task</button>
              <button class="ghost-button" id="clear-button" type="button">Clear calendars</button>
              <button class="ghost-button" id="download-button" type="button">Download Schedule</button>
            </div>

            <p class="helper-text" id="form-feedback">
              Auto-place uses four weeks and starts each new task on a later day than the previous task finished.
            </p>
          </form>
        </section>

        <section class="panel calendar-panel">
          <div class="summary-strip" id="summary-strip"></div>
          <div class="warning-banner is-hidden" id="warning-banner"></div>
          <div class="weeks-stack" id="weeks-stack"></div>
        </section>
      </main>

      <section class="print-sheet" id="print-sheet" aria-hidden="true"></section>
    </div>

    <template id="task-row-template">
      <label class="task-row">
        <input class="task-select" type="radio" name="selectedTask" />
        <div class="task-row-body">
          <span class="task-number"></span>
          <input class="task-name" placeholder="Task name" />
          <input class="task-hours" type="number" min="0.25" step="0.01" value="1" />
        </div>
      </label>
    </template>

    <template id="week-template">
      <section class="week-section">
        <div class="week-heading">
          <p class="eyebrow week-label"></p>
          <h2 class="week-range"></h2>
        </div>
        <div class="calendar-shell">
          <div class="calendar-grid"></div>
        </div>
      </section>
    </template>

    <template id="day-column-template">
      <article class="calendar-day">
        <div class="calendar-day-header">
          <div class="calendar-day-meta">
            <div class="calendar-day-title">
              <span class="calendar-day-name"></span>
              <span class="calendar-day-date"></span>
            </div>
            <div class="calendar-day-submeta">
              <label class="calendar-day-toggle bank-holiday-toggle is-hidden">
                <input class="calendar-day-bank-holiday" type="checkbox" />
                <span>BH</span>
              </label>
              <label class="calendar-day-toggle day-enabled-toggle">
                <input class="calendar-day-enabled" type="checkbox" />
                <span>In</span>
              </label>
            </div>
          </div>
        </div>
        <div class="calendar-time-edit">
          <label>
            Start
            <input class="calendar-day-start" type="time" />
          </label>
          <label>
            End
            <input class="calendar-day-end" type="time" />
          </label>
        </div>
        <div class="calendar-track">
          <div class="calendar-track-grid"></div>
          <div class="availability-layer"></div>
          <div class="session-layer"></div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
